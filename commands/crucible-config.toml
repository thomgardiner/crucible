description = "Show or set Crucible's machine-wide resource budget"
prompt = "Run `crucible config` and report the machine-wide concurrency slots, where the value comes from (env, machine config file, or default), and the per-tree memory ceiling. If the user wants a different budget, run `crucible config max-concurrency <N>` — it persists to the machine-level config file, is capped at core count, and prints the new per-tree ceiling (more slots = a lower ceiling each, since the 80%-of-RAM budget splits N ways). The env var CRUCIBLE_MAX_CONCURRENCY overrides the file per-shell. Do not raise the count merely because a run is queued behind another session; the queue is the protection."
