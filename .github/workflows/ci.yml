# Lightweight verification on every push/PR. Release artifacts stay on release.yml (tags).
name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: same-commit approval audit needs parents of HEAD.
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Format
        if: runner.os == 'Linux'
        run: cargo fmt --all -- --check
      - name: Test
        run: cargo test --locked
      - name: Clippy
        if: runner.os == 'Linux'
        run: cargo clippy --all-targets --locked -- -D warnings
      - name: Self-check
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cargo build --locked
          # Independence is push-time; local hooksPath must reach adapter.prePush.
          git config core.hooksPath .githooks
          ./target/debug/crucible check
          ./target/debug/crucible test-smells tests src
