# Lightweight verification on every push/PR. Release artifacts stay on release.yml (tags).
name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: same-commit approval audit needs parents of HEAD.
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Test
        run: cargo test --locked
      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings
      - name: Self-check
        run: |
          cargo build --locked
          ./target/debug/crucible check
          ./target/debug/crucible test-smells tests src
