# Lightweight verification on every push/PR. Release artifacts stay on release.yml (tags).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test --locked
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Self-check
        run: |
          cargo build --locked
          ./target/debug/crucible check
          ./target/debug/crucible test-smells tests src
